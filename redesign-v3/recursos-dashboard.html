<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Recursos · Colegio Camilo Henríquez</title>
  <link rel="stylesheet" href="layout.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* Sub-nav */
    .r-subnav{display:flex;gap:0;padding:0 32px;border-bottom:1px solid rgba(46,109,164,0.12);overflow-x:auto;scrollbar-width:none}
    .r-subnav::-webkit-scrollbar{display:none}
    .r-subnav a{display:flex;align-items:center;gap:6px;padding:12px 16px;font-size:12px;font-weight:600;color:rgba(232,237,245,0.45);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s}
    .r-subnav a:hover{color:rgba(232,237,245,0.8)}
    .r-subnav a.active{color:#F5A623;border-bottom-color:#F5A623}
    .r-subnav a .r-sn-icon{font-size:14px}

    /* Section */
    .r-section{padding:36px 32px}
    .r-section-header{margin-bottom:24px}
    .r-section-title{font-size:22px;font-weight:800;color:rgba(232,237,245,0.95);line-height:1.2;margin-bottom:6px}
    .r-section-sub{font-size:13px;color:rgba(232,237,245,0.45);line-height:1.6;max-width:560px}

    /* Dashboard */
    .dtab{padding:10px 14px;font-size:12px;font-weight:600;color:rgba(232,237,245,.55);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.02em}
    .dtab:hover{color:rgba(232,237,245,.9)}
    .dtab.active{color:#F5A623;border-bottom-color:#F5A623}
    .d-container{max-width:1100px;margin:0 auto;padding:0}
    .section{display:none}
    .section.active{display:block}
    .sh{margin-bottom:28px}
    .sh h1{font-size:clamp(1.3rem,3vw,1.8rem);font-weight:800;line-height:1.2;margin-bottom:6px;color:rgba(232,237,245,0.95)}
    .sh h1 span{color:#F5A623}
    .sh p{font-size:.9rem;color:rgba(232,237,245,.6);line-height:1.65;max-width:680px}
    .src{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:rgba(232,237,245,.3);background:rgba(46,109,164,.1);border:1px solid rgba(46,109,164,.2);border-radius:20px;padding:3px 10px;margin-top:10px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
    .card{background:rgba(13,31,60,.85);border:1px solid rgba(46,109,164,.2);border-radius:14px;padding:20px;margin-bottom:0}
    .card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(232,237,245,.3);margin-bottom:14px}
    .src-card{font-size:11px;color:rgba(232,237,245,.3);margin-top:14px;font-style:italic}
    .kpi{text-align:center}
    .kpi .num{font-size:clamp(1.8rem,4vw,2.5rem);font-weight:900;line-height:1;margin-bottom:4px}
    .kpi-bar{width:28px;height:3px;border-radius:2px;margin:7px auto 9px}
    .kpi .lbl{font-size:11px;color:rgba(232,237,245,.6);line-height:1.4}
    .kpi .sub{font-size:11px;color:rgba(232,237,245,.3);margin-top:3px}
    .a{color:#F5A623}.r{color:#E85D24}.g{color:#5DCAA5}.b{color:#7EC8E3}.p{color:#C4A8F0}
    .ba{background:#F5A623}.br{background:#E85D24}.bg{background:#5DCAA5}.bb{background:#7EC8E3}.bp{background:#C4A8F0}
    .pi{margin-bottom:12px}
    .ph{display:flex;justify-content:space-between;margin-bottom:5px}
    .pl{font-size:13px;color:rgba(232,237,245,1)}
    .pv{font-size:13px;font-weight:700}
    .pt{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
    .pf{height:100%;border-radius:3px;transition:width 1.2s ease}
    .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
    .pill{font-size:11px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid rgba(46,109,164,.2);color:rgba(232,237,245,.6);cursor:pointer;transition:all .2s;background:transparent;font-family:inherit}
    .pill:hover{border-color:rgba(245,166,35,.4);color:rgba(232,237,245,1)}
    .pill.active{background:rgba(245,166,35,.15);border-color:rgba(245,166,35,.5);color:#F5A623}
    .pill.active-blue{background:rgba(46,109,164,.2);border-color:rgba(126,200,227,.4);color:#7EC8E3}
    .cr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(46,109,164,.2)}
    .cr:last-child{border-bottom:none}
    .cl{font-size:13px;color:rgba(232,237,245,1);flex:1}
    .ct{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:600;white-space:nowrap}
    .can{background:rgba(166,50,40,.2);color:#E85D24}
    .cannot{background:rgba(31,107,59,.2);color:#5DCAA5}
    .hl{background:linear-gradient(135deg,rgba(245,166,35,.08),rgba(200,100,0,.04));border:1px solid rgba(245,166,35,.22);border-radius:10px;padding:16px 20px;margin-bottom:16px}
    .hl .hn{font-size:2rem;font-weight:900;color:#F5A623}
    .hl .hx{font-size:12px;color:rgba(232,237,245,.6);margin-top:4px;line-height:1.5}
    .cw{position:relative;width:100%}
    .slider-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .slider-row label{font-size:12px;color:rgba(232,237,245,.6);white-space:nowrap;min-width:130px}
    .slider-row input[type=range]{flex:1;accent-color:#F5A623}
    .slider-row .val{font-size:13px;font-weight:700;color:#F5A623;min-width:40px;text-align:right}
    .sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
    .sector-card{background:rgba(13,31,60,.85);border:1px solid rgba(46,109,164,.2);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s}
    .sector-card:hover{border-color:rgba(245,166,35,.3)}
    .sector-card.selected{border-color:rgba(245,166,35,.6);background:rgba(245,166,35,.08)}
    .sector-card .si{font-size:22px;margin-bottom:8px}
    .sector-card .sn{font-size:12px;font-weight:700;color:rgba(232,237,245,1);margin-bottom:4px}
    .sector-card .sd{font-size:10px;color:rgba(232,237,245,.6)}
    .country-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(46,109,164,.2)}
    .country-row:last-child{border:none}
    .country-check{width:16px;height:16px;cursor:pointer;accent-color:#F5A623}
    .country-name{font-size:12px;color:rgba(232,237,245,1);flex:1}
    .country-val{font-size:11px;font-weight:700}
    .entry-btn{background:rgba(13,31,60,.9);border:1px solid rgba(46,109,164,.2);border-radius:10px;color:rgba(232,237,245,1);font-size:13px;font-weight:600;padding:14px 24px;cursor:pointer;transition:all .2s;font-family:inherit}
    .entry-btn:hover{border-color:rgba(245,166,35,.5);background:rgba(245,166,35,.08);color:#F5A623}
    .tl{display:flex;gap:14px;margin-bottom:18px}
    .td2{width:9px;height:9px;border-radius:50%;background:#F5A623;margin-top:4px;flex-shrink:0}
    .tc .tll{font-size:10px;color:rgba(232,237,245,.3);margin-bottom:2px}
    .tc .tln{font-size:1rem;font-weight:800;color:#F5A623}
    .tc .tlt{font-size:11px;color:rgba(232,237,245,.6);line-height:1.5}
    .rv{opacity:1;transform:none}
    select{background:rgba(13,31,60,.9);color:rgba(232,237,245,1);border:1px solid rgba(46,109,164,.2);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;outline:none}

    @media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
    @media(max-width:768px){.r-subnav{padding:0 16px}}
    @media(max-width:640px){.g4{grid-template-columns:1fr 1fr}}
    @media(max-width:480px){
      .g4{grid-template-columns:1fr}
      .g3{grid-template-columns:1fr}
      .r-section{padding:28px 16px}
      .slider-row{flex-direction:column;align-items:flex-start;gap:8px}
      .slider-row label{min-width:auto}
    }
  </style>
</head>
<body>
  <main id="v3-content">

    <!-- Sub-nav -->
    <div class="r-subnav">
      <a href="recursos.html"><span class="r-sn-icon">←</span> Recursos</a>
      <a href="recursos-autodiag.html"><span class="r-sn-icon">🧭</span> Autodiagnóstico</a>
      <a href="recursos-dashboard.html" class="active"><span class="r-sn-icon">📊</span> Dashboard</a>
      <a href="recursos-mensajes.html"><span class="r-sn-icon">✉️</span> Mensajes</a>
    </div>

    <!-- Content -->
    <div id="dashboard" class="r-section">
      <div class="r-section-header">
        <span class="v3-tag">Dashboard de datos</span>
        <h2 class="r-section-title">El mapa del cambio — explorable por sector y perfil</h2>
        <p class="r-section-sub">Datos verificados WEF · Goldman Sachs · FMI · OCDE · Lightcast · PwC</p>
      </div>
    </div>

  </main>
  <script src="layout.js"></script>
  <script src="recursos-dash.js"></script>
</body>
</html>
